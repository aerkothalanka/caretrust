    value: "01d40772d8293b41"
  - name: CARESIGNAL_FALLBACK_ON_ERROR
    value: "true"
  - name: CARESIGNAL_DATABRICKS_LIMIT
    value: "1000"
  - name: CARESIGNAL_PINCODE_LIMIT
    value: "25000"
  - name: GEMINI_API_KEY
    valueFrom: gemini-api-key
  - name: GEMINI_LIVE_MODEL
    value: "gemini-3.1-flash-live-preview"
  - name: GEMINI_LIVE_VOICE
    value: "Puck"
